version: "3.9"

services:

  # =========================
  # 🐬 MYSQL DATABASE
  # =========================
  mysql:
    image: mysql:8.0
    container_name: video_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: video_stream

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    # ✅ HEALTH CHECK (VERY IMPORTANT)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  # =========================
  # 🚀 SPRING BOOT BACKEND
  # =========================
  backend:
    build: .
    container_name: video_backend
    restart: on-failure:5

    ports:
      - "8080:8080"

    env_file:
      - .env

    # ✅ WAIT UNTIL MYSQL IS HEALTHY
    depends_on:
      mysql:
        condition: service_healthy

    # extra safety (prevents early DB crash)
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/video_stream
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data: