spring.application.name=cloudflare r2

# Server Configuration
#server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://video-stream.cngku80a64d7.ap-south-1.rds.amazonaws.com:3306/video_stream?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:root1234}

#spring.datasource.url=jdbc:mysql://video-stream.cngku80a64d7.ap-south-1.rds.amazonaws.com:3306/video_stream?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
#spring.datasource.username=admin
#spring.datasource.password=root1234


# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cloudflare R2 Configuration
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL}

app.video.temp-path=/tmp/videos

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Redis (AWS ElastiCache)
spring.redis.host=mycache-zw3qkq.serverless.aps1.cache.amazonaws.com
spring.redis.port=6379
spring.redis.ssl=true


# Cache type
spring.cache.type=redis
